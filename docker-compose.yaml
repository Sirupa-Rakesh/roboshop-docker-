services:
  mongodb:
    build:
      context: ./1-mongodb
      dockerfile: Dockerfile #it moves to the current directory
    image: mongodb # docker build -t mongodb
    container_name: mongodb
  catalogue:
    build: 
      context: ./2-catalogue
      dockerfile: Dockerfile
    image: catalogue 
    container_name: catalogue
    depends_on:
      - mongodb

networks:
  default:
    driver: bridge
    name: rakesh
    external: false # true means  u need to create it maually, but false means it will create 
